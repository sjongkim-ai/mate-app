<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TripMate - 트립메이트</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2f;
      --panel-2: #17213a;
      --text: #f6f0df;
      --muted: rgba(246, 240, 223, 0.68);
      --soft: rgba(246, 240, 223, 0.18);
      --gold: #d7b45d;
      --coral: #ef6f7f;
      --teal: #35c6a6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(53, 198, 166, 0.18), transparent 28%),
        radial-gradient(circle at 82% 8%, rgba(239, 111, 127, 0.16), transparent 24%),
        linear-gradient(180deg, #0b1020 0%, #10162a 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .phone {
      width: min(100%, 410px);
      min-height: min(820px, calc(100vh - 44px));
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(180deg, rgba(18, 26, 47, 0.94), rgba(11, 16, 32, 0.98));
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 22px 10px;
    }

    .brand {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0;
      color: var(--gold);
    }

    .pill {
      border: 1px solid rgba(215, 180, 93, 0.35);
      color: var(--gold);
      background: rgba(215, 180, 93, 0.1);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 24px 28px;
      gap: 24px;
    }

    .hero {
      display: grid;
      gap: 18px;
    }

    .avatars {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 116px;
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 3px solid var(--bg);
      display: grid;
      place-items: center;
      font-size: 34px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.26);
    }

    .avatar:nth-child(1) {
      background: linear-gradient(145deg, #203f61, #2e7d6a);
      transform: translateX(14px) scale(0.86);
    }

    .avatar:nth-child(2) {
      width: 96px;
      height: 96px;
      font-size: 42px;
      background: linear-gradient(145deg, #73512a, #d7b45d);
      border-color: rgba(215, 180, 93, 0.75);
      z-index: 2;
    }

    .avatar:nth-child(3) {
      background: linear-gradient(145deg, #542c53, #ef6f7f);
      transform: translateX(-14px) scale(0.86);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 10vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
      text-align: center;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 310px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
      text-align: center;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--soft);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 999px;
      color: var(--muted);
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 700;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    a,
    button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 16px;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
    }

    .primary {
      color: #15100a;
      background: linear-gradient(135deg, #f6d995, var(--gold));
    }

    .secondary {
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--soft);
    }

    .ghost {
      display: block;
      color: var(--muted);
      font-size: 13px;
      padding: 8px;
    }

    footer {
      padding: 0 24px 24px;
      color: rgba(246, 240, 223, 0.42);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="phone">
    <header>
      <div class="brand">TripMate</div>
      <div class="pill">MVP</div>
    </header>

    <main>
      <section class="hero" aria-label="TripMate 첫 화면">
        <div class="avatars" aria-hidden="true">
          <div class="avatar">🌿</div>
          <div class="avatar">✈️</div>
          <div class="avatar">🍜</div>
        </div>

        <h1>내 여행 취향에 맞는 동행 찾기</h1>
        <p class="subtitle">
          AI가 여행 스타일 초안을 만들고, 내가 승인한 프로필로 같은 목적지의 동행을 찾아요.
        </p>

        <div class="chips" aria-label="핵심 기능">
          <span class="chip">여행 성향 분석</span>
          <span class="chip">목적지 매칭</span>
          <span class="chip">학교/동네 필터</span>
          <span class="chip">동행 요청 후 채팅</span>
        </div>
      </section>

      <section class="actions" aria-label="시작하기">
        <button class="primary" type="button">내 여행 동반자 찾기</button>
        <button class="secondary" type="button">신규 회원 가입</button>
        <a class="ghost" href="/matches">비회원으로 둘러보기</a>
      </section>
    </main>

    <footer>privacy first · self-expression first</footer>
  </div>
</body>
</html>
